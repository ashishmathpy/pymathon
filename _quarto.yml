project:
  type: website
  output-dir: docs
  render:
    - index.qmd
    - about.qmd
    - posts/positive-integer-solutions/index.qmd
    - posts/kings-property/index.qmd
    - posts/sumsets-and-arithmetic-progressions/index.qmd
    - posts/longest-collatz-sequence/index.ipynb
    - source-notebooks/positive-integer-solutions.ipynb
  resources:
    - share.js
    - fonts/**
    - source-notebooks/positive-integer-solutions.ipynb
    # Place a Google Search Console HTML verification file in the project root.
    # Quarto will copy a file named google*.html into docs unchanged.
    - google*.html

website:
  title: "PyMathon"
  description: "PyMathon presents carefully written mathematics through definitions, proofs, worked examples, problem solving, and selective computational exploration."
  site-url: https://ashishmathpy.github.io/pymathon/
  open-graph: true
  search: true
  page-navigation: true
  navbar:
    logo: image.png
    logo-alt: PyMathon logo
    left:
      - text: Home
        href: index.qmd
      - text: Articles
        href: index.qmd#latest-articles
      - text: About
        href: about.qmd
format:
  html:
    theme: cosmo
    html-math-method: mathml
    highlight-style: monokai
    code-line-numbers: true
    canonical-url: true
    toc: true
    css: styles.css
    include-in-header: includes/seo-head.html
