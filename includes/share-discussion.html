    <a class="share-button" data-share="whatsapp" target="_blank" rel="noopener noreferrer" aria-label="Share this article on WhatsApp">WhatsApp</a>
    <a class="share-button" data-share="linkedin" target="_blank" rel="noopener noreferrer" aria-label="Share this article on LinkedIn">LinkedIn</a>
